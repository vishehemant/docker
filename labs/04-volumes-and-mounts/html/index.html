<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bind Mount Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 80px auto;
            padding: 0 20px;
            background: #0d1117;
            color: #c9d1d9;
        }
        h1 { color: #58a6ff; }
        .highlight {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            margin: 16px 0;
        }
    </style>
</head>
<body>
    <h1>Bind Mount Demo</h1>
    <p>This file is served from a <strong>bind mount</strong>.</p>
    <div class="highlight">
        <p>Edit this file on your host machine and refresh the browser — changes appear instantly without rebuilding the image!</p>
    </div>
    <p>This is why bind mounts are popular for local development workflows.</p>
</body>
</html>
